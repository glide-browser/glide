name: Docs

on:
  workflow_dispatch:
    inputs:
      branch:
        type: string
        required: false
        description: branch to deploy to
  push:
    branches:
      - docs-production

jobs:
  deploy:
    name: deploy
    environment: docs

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global \
            url."https://github.com/mozilla-firefox/firefox.git".insteadOf \
            "git@github.com:mozilla-firefox/firefox.git"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd infra && pnpm --ignore-workspace install --frozen-lockfile

      - name: Bundle vendored dependencies
        run: pnpm bundle

      - name: Compile TS
        run: pnpm build:ts

      - name: Build docs
        run: pnpm build:docs

      - name: Transform docs
        run: pnpm build:docs:production

      - name: Deploy to Cloudflare
        working-directory: infra
        run: |
          pnpm wrangler pages deploy --cwd=../src/glide/docs \
            dist \
            --project-name=glide \
            --branch="$BRANCH"
        env:
          BRANCH: ${{ inputs.branch || 'main' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
