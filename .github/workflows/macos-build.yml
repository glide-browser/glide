name: macOS Build

on:
  workflow_dispatch:
    inputs:
      artifacts:
        description: "Upload built artifacts"
        type: boolean
        default: true
      MOZ_BUILD_DATE:
        type: string
        default: ""
        description: "Set the build id"
  workflow_call:
    inputs:
      artifacts:
        description: "Used to distinguish dispatch and call events"
        required: true
        type: boolean
      MOZ_BUILD_DATE:
        type: string
        default: ""
        description: "Set the build id"

jobs:
  macos-build:
    name: Build - ${{ matrix.arch }}

    runs-on: depot-macos-14
    env:
      CARGO_TERM_COLOR: always
      GLIDE_PLATFORM: macos
      GLIDE_RELEASE: true
      GLIDE_LTO: 1
      GLIDE_DISABLE_PGO: 1
      GLIDE_COMPAT: ${{ matrix.arch }}
      MOZ_BUILD_DATE: ${{ inputs.MOZ_BUILD_DATE }}

    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, x86_64]

    steps:
      - name: Debug
        run: |
          xcrun --show-sdk-version

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global \
            url."https://github.com/mozilla-firefox/firefox.git".insteadOf \
            "git@github.com:mozilla-firefox/firefox.git"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
        with:
          disable_annotations: true

      - name: Expose actions cache variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6.4.1
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])

      - name: Install system dependencies
        run: |
          brew update
          brew install cairo gnu-tar mercurial

          brew uninstall --ignore-dependencies python3.12 -f

          export PATH="$(python3 -m site --user-base)/bin":$PATH

          rm '/usr/local/bin/2to3-3.11' '/usr/local/bin/2to3-3.12' '/usr/local/bin/2to3' || true
          rm '/usr/local/bin/idle3.11' '/usr/local/bin/idle3.12' '/usr/local/bin/idle3' || true
          rm '/usr/local/bin/pydoc3.11' '/usr/local/bin/pydoc3.12' '/usr/local/bin/pydoc3' || true
          rm '/usr/local/bin/python3.11' '/usr/local/bin/python3.12' '/usr/local/bin/python3' || true
          rm '/usr/local/bin/python3.11-config' '/usr/local/bin/python3.12-config' '/usr/local/bin/python3-config' || true

          brew install watchman

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.90
          source $HOME/.cargo/env

          if test "$GLIDE_COMPAT" = "aarch64"; then
            rustup target add aarch64-apple-darwin
          else
            rustup target add x86_64-apple-darwin
            brew install nasm
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap repo
        run: |
          pnpm bootstrap

      - name: Bootstrap system
        working-directory: engine
        run: |
          export PATH="$(python3 -m site --user-base)/bin":$PATH
          ./mach --verbose --no-interactive bootstrap --application-choice browser --no-system-changes || true

      # this is only needed temporarily while the SDK url in the current firefox tree reuslts in a 403
      - name: Download macOS SDK
        run: |
          cd engine
          export PATH="$(python3 -m site --user-base)/bin":$PATH
          PYTHONPATH=python/mozbuild python3 taskcluster/scripts/misc/unpack-sdk.py \
            "https://swcdn.apple.com/content/downloads/60/13/122-35686-A_30JUXWIJFR/ck0gzuw5qccefzm3ptlwou3pu6a55d0o02/CLTools_macOSNMOS_SDK.pkg" \
            "3e4e755526d97d4ccc8caa0d42c6ecb41cfd009a9e2848f86766f0eb30990f0f26709339caa926151becd4501df59cfeaa47a0caa7b8ad13c4211b607d1e63c8" \
            "Library/Developer/CommandLineTools/SDKs/MacOSX26.4.sdk" \
            "$HOME/.mozbuild/MacOSX26.0.sdk"
          cd ..

      - name: Build
        run: |
          pnpm build

      - name: Package
        run: |
          pnpm package

      - name: Rename artifacts
        run: |
          mv dist/glide-*.dmg "dist/glide.macos-$GLIDE_COMPAT.dmg"
          mv dist/output.mar "dist/macos-$GLIDE_COMPAT.mar"

      - name: Upload DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          retention-days: 10
          name: glide.macos-${{ matrix.arch }}.dmg
          path: ./dist/glide.macos-${{ matrix.arch }}.dmg

      - name: Upload MAR
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          retention-days: 10
          name: macos-${{ matrix.arch }}.mar
          path: ./dist/macos-${{ matrix.arch }}.mar

      - name: Upload browser upload manifests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          retention-days: 10
          name: macos-${{ matrix.arch }}-updates
          path: ./dist/update/
