name: macOS Build

on:
  workflow_dispatch:
    inputs:
      artifacts:
        description: "Upload built artifacts"
        type: boolean
        default: true
      MOZ_BUILD_DATE:
        type: string
        default: ""
        description: "Set the build id"
  workflow_call:
    inputs:
      artifacts:
        description: "Used to distinguish dispatch and call events"
        required: true
        type: boolean
      MOZ_BUILD_DATE:
        type: string
        default: ""
        description: "Set the build id"

jobs:
  macos-build:
    name: Build - ${{ matrix.arch }}

    runs-on: depot-macos-15
    env:
      CARGO_TERM_COLOR: always
      GLIDE_PLATFORM: macos
      GLIDE_RELEASE: true
      GLIDE_LTO: 1
      GLIDE_DISABLE_PGO: 1
      GLIDE_COMPAT: ${{ matrix.arch }}
      MOZ_BUILD_DATE: ${{ inputs.MOZ_BUILD_DATE }}

    defaults:
      run:
        shell: nix develop --command bash -e {0}

    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, x86_64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-nix

      - name: Debug
        run: |
          xcrun --show-sdk-version

      - name: Configure git
        run: |
          git config --global \
            url."https://github.com/mozilla-firefox/firefox.git".insteadOf \
            "git@github.com:mozilla-firefox/firefox.git"

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
        with:
          disable_annotations: true

      - name: Expose actions cache variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6.4.1
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env['ACTIONS_CACHE_URL'])
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN'])

      - name: Configure rust
        run: |
          if test "$GLIDE_COMPAT" = "aarch64"; then
            rustup target add aarch64-apple-darwin
          else
            rustup target add x86_64-apple-darwin
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bootstrap repo
        run: |
          pnpm bootstrap

          cd engine
          ./mach --no-interactive bootstrap --application-choice browser --no-system-changes || true
          cd ..

      - name: Build
        run: |
          pnpm build

      - name: Package
        run: |
          pnpm package

      - name: Rename artifacts
        run: |
          mv dist/glide-*.dmg "dist/glide.macos-$GLIDE_COMPAT.dmg"
          mv dist/output.mar "dist/macos-$GLIDE_COMPAT.mar"

      - name: Upload DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          retention-days: 10
          name: glide.macos-${{ matrix.arch }}.dmg
          path: ./dist/glide.macos-${{ matrix.arch }}.dmg

      - name: Upload MAR
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          retention-days: 10
          name: macos-${{ matrix.arch }}.mar
          path: ./dist/macos-${{ matrix.arch }}.mar

      - name: Upload browser upload manifests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          retention-days: 10
          name: macos-${{ matrix.arch }}-updates
          path: ./dist/update/
